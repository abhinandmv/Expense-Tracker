<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Expense Tracker</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}"/>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js" defer></script>
</head>
<body>

<div id="particles-js"></div>

<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Welcome Back</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-list">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="post" id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-auth">Login</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Register</a>
    </p>
  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
  particlesJS("particles-js", {
    particles: {
      number: { value: 120, density: { enable: true, value_area: 900 } },
      color: { value: "#4f8ef7" },
      shape: { type: "circle" },
      opacity: { value: 0.4, random: true, anim: { enable: true, speed: 1, opacity_min: 0.1 } },
      size:    { value: 3, random: true },
      line_linked: { enable: true, distance: 150, color: "#4f8ef7", opacity: 0.15, width: 1 },
      move:    { enable: true, speed: 2, direction: "none", out_mode: "out" }
    },
    interactivity: {
      events: {
        onhover: { enable: true, mode: "repulse" },
        onclick:  { enable: true, mode: "push" }
      },
      modes: { repulse: { distance: 100 }, push: { particles_nb: 6 } }
    },
    retina_detect: true
  });

  gsap.from("#login-form .form-group", {
    opacity: 0, y: 18, stagger: 0.15, delay: 0.3, duration: 0.6, ease: "power2.out"
  });
});
</script>
</body>
</html>
